<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Untuk RARA</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Container Pembungkus */
        .wrapper {
            position: relative;
            cursor: pointer;
            margin-top: 50px;
        }

        /* Tampilan Amplop */
        .envelope {
            width: 300px;
            height: 200px;
            background-color: #f48fb1;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s;
        }

        .wrapper:hover .envelope {
            transform: translateY(-5px);
        }

        /* Lipatan Atas Amplop */
        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid #f06292;
            transform-origin: top;
            transition: transform 0.5s ease-in-out;
            z-index: 3;
        }

        /* Tulisan di Depan Amplop */
        .envelope-text {
            color: white;
            font-weight: bold;
            font-size: 20px;
            z-index: 2;
            margin-top: 40px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* Tampilan Surat (Tersembunyi di dalam Amplop) */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            max-height: 80vh;
            background: white;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 0.6s ease-in-out, opacity 0.4s ease-in-out;
            z-index: 1;
            opacity: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-y: auto;
        }

        .letter p {
            color: #333;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .letter .from {
            font-weight: bold;
            color: #d81b60;
            font-size: 13px;
            margin-bottom: 10px;
        }

        /* Tombol Myself dengan Icon Foto */
        .photo-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: #f8bbd0;
            color: #880e4f;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            user-select: none;
        }

        .photo-btn:hover {
            background-color: #f48fb1;
            transform: scale(1.05);
        }

        /* Kontainer Foto */
        .photo-container {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            margin-bottom: 12px;
            animation: fadeIn 0.4s ease-in-out;
        }

        .photo-wrapper {
            width: 100%;
            max-height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 8px;
            background-color: #fafafa;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            max-height: 220px;
            object-fit: contain; /* Memastikan foto penuh terlihat tanpa terpotong */
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .photo-caption {
            font-size: 11px;
            color: #777;
            margin-top: 6px;
            font-style: italic;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Efek Saat Amplop Di-klik (Terbuka) */
        .wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .wrapper.open .letter {
            transform: translate(-50%, -140px);
            opacity: 1;
            z-index: 4; /* Berada di paling depan agar tidak tertutup lipatan amplop */
        }

        /* Petunjuk Tambahan */
        .hint {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="wrapper" id="envelopeWrapper">
        <div class="flap"></div>
        <div class="envelope">
            <span class="envelope-text">For: RARA</span>
        </div>
        <div class="letter" id="letterBox">
            <!-- Tempat Foto Muncul -->
            <div class="photo-container" id="photoContainer">
                <div class="photo-wrapper">
                    <img id="photoDisplay" src="" alt="Myself Photo">
                </div>
                <span class="photo-caption" id="photoCaption">Klik foto untuk ganti</span>
            </div>

            <p>Semoga sakitnya cepat sembuh ya buat RARA, tetap semangat! Tuhan Yesus memberkati.</p>
            <div class="from">From: Yowelll</div>

            <!-- Tombol Icon Myself -->
            <div class="photo-btn" id="myselfBtn">
                📷 <span>Myself</span>
            </div>
        </div>
        <div class="hint" id="hintText">Klik amplop untuk membuka</div>
    </div>

    <script>
        const envelopeWrapper = document.getElementById('envelopeWrapper');
        const hintText = document.getElementById('hintText');
        const letterBox = document.getElementById('letterBox');
        const myselfBtn = document.getElementById('myselfBtn');
        const photoContainer = document.getElementById('photoContainer');
        const photoDisplay = document.getElementById('photoDisplay');
        const photoCaption = document.getElementById('photoCaption');

        // Nama file sesuai foto di folder kamu
        const photoBefore = "rara1.jpeg";
        const photoAfter = "rara2.jpeg";

        let photoState = 0; // 0: tersembunyi, 1: photo 1 (before), 2: photo 2 (after)

        // Buka / Tutup Amplop
        envelopeWrapper.addEventListener('click', function(e) {
            // Cegah amplop menutup jika tombol myself / foto yang diklik
            if (e.target.closest('#myselfBtn') || e.target.closest('#photoContainer')) return;

            envelopeWrapper.classList.toggle('open');

            if (envelopeWrapper.classList.contains('open')) {
                hintText.textContent = "Klik latar/amplop untuk menutup";
            } else {
                hintText.textContent = "Klik amplop untuk membuka";
                // Reset foto saat amplop ditutup
                photoContainer.style.display = "none";
                photoState = 0;
            }
        });

        // Klik Tombol "Myself 📷"
        myselfBtn.addEventListener('click', function(e) {
            e.stopPropagation(); // Mencegah memicu fungsi klik amplop
            if (photoState === 0) {
                photoState = 1;
                photoDisplay.src = photoBefore;
                photoCaption.textContent = "Klik foto untuk lihat After (1/2)";
                photoContainer.style.display = "flex";
            } else {
                // Sembunyikan foto jika tombol diklik lagi
                photoContainer.style.display = "none";
                photoState = 0;
            }
        });

        // Klik pada Foto untuk berganti dari Before ke After
        photoDisplay.addEventListener('click', function(e) {
            e.stopPropagation(); // Mencegah memicu fungsi klik amplop
            if (photoState === 1) {
                photoState = 2;
                photoDisplay.src = photoAfter;
                photoCaption.textContent = "Foto After ✨ (2/2)";
            } else if (photoState === 2) {
                photoState = 1;
                photoDisplay.src = photoBefore;
                photoCaption.textContent = "Foto Before 👈 (1/2)";
            }
        });
    </script>

</body>
</html>
